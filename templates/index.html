<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>局域网文件传输</title>
  <style>
    :root {
      --bg1: #f3f8ff;
      --bg2: #edf8f1;
      --panel: #ffffff;
      --line: #d7e0ea;
      --txt: #1d2b36;
      --muted: #607080;
      --mobile: #e8f7ff;
      --desktop: #eef8ea;
      --accent: #166534;
      --danger: #be123c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--txt);
      background: radial-gradient(circle at 0% 0%, var(--bg1), transparent 55%),
                  radial-gradient(circle at 100% 100%, var(--bg2), transparent 50%),
                  #f7fafc;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(720px, 100%);
      height: calc(100vh - 32px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(20, 35, 50, 0.08);
    }

    .top {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #fbfdff;
    }

    .title {
      font-weight: 600;
      font-size: 15px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .status.ok { color: #0f766e; }
    .status.err { color: var(--danger); }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qr-card {
      margin: 12px 14px 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbff;
      padding: 12px;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .qr-card.show { display: flex; }

    .qr-img {
      width: 96px;
      height: 96px;
      border: 1px solid #c8d6e5;
      border-radius: 8px;
      background: #fff;
      object-fit: contain;
      padding: 4px;
    }

    .qr-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .qr-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qr-title {
      font-size: 13px;
      font-weight: 600;
      color: #22384a;
    }

    .qr-link {
      font-size: 12px;
      color: #1d4ed8;
      text-decoration: none;
      word-break: break-all;
    }

    .qr-link:hover { text-decoration: underline; }

    .qr-expire {
      font-size: 12px;
      color: #465a6f;
    }

    .btn.qr-refresh {
      padding: 4px 8px;
      font-size: 12px;
    }

    .records {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      margin: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      display: flex;
    }

    .row.mobile { justify-content: flex-end; }
    .row.desktop { justify-content: flex-start; }
    .row.selectable { cursor: pointer; }
    .row.selectable .bubble { transition: border-color 0.15s ease, box-shadow 0.15s ease; }
    .row.selectable.selected .bubble {
      border-color: #1d4ed8;
      box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.15);
    }

    .bubble {
      max-width: 90%;
      border-radius: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--mobile);
    }

    .row.desktop .bubble { background: var(--desktop); }

    .name {
      font-size: 14px;
      font-weight: 600;
      word-break: break-all;
    }
    .name.clickable {
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: #94a3b8;
    }

    .desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 1px solid #b9c5d2;
      background: #fff;
      color: #243646;
      border-radius: 8px;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .btn.primary {
      border-color: #1d4ed8;
      color: #fff;
      background: #1d4ed8;
    }

    .btn.danger {
      border-color: #be123c;
      color: #be123c;
      background: #fff1f2;
    }

    .btn.send {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
      min-width: 130px;
      height: 40px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }

    .btn.camera {
      border-color: #0284c7;
      background: #0284c7;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
      min-width: 130px;
      height: 40px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }

    .bottom {
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #fbfdff;
    }

    .bottom-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tip {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      flex: 1;
    }

    #fileInput, #cameraInput { display: none; }

    .drop-zone {
      margin: 0 14px 10px;
      border: 1px dashed #9ab4cc;
      color: #46657f;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      background: #f5f9ff;
      display: none;
    }

    .selection-bar {
      margin: 0 14px 10px;
      border: 1px solid #d8e3ef;
      border-radius: 12px;
      background: #f8fbff;
      padding: 10px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .selection-bar.show { display: flex; }

    .selection-summary {
      font-size: 12px;
      color: #33485a;
    }

    .selection-actions {
      display: flex;
      gap: 8px;
    }

    .drop-zone.active {
      display: block;
      animation: pulse 1s ease-in-out infinite alternate;
    }

    .upload-jobs {
      margin: 0 14px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: #f8fbff;
      display: none;
      flex-direction: column;
      gap: 8px;
      max-height: 180px;
      overflow-y: auto;
    }

    .upload-jobs.show { display: flex; }

    .upload-job {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 24px;
    }

    .upload-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }

    .upload-name {
      font-weight: 600;
      color: #22384a;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-status {
      color: #506578;
      white-space: nowrap;
    }

    .upload-meta {
      font-size: 12px;
      color: #597087;
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #d4e1ee;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.16s linear;
    }

    .upload-job.done .upload-status { color: #15803d; }
    .upload-job.fail .upload-status { color: var(--danger); }
    .upload-job.fail .progress-fill { background: var(--danger); }
    .upload-job.canceled .upload-status { color: var(--danger); }
    .upload-job.canceled .progress-fill { background: #ef4444; }

    .job-cancel-btn {
      position: absolute;
      top: 0;
      right: 0;
      width: 16px;
      height: 16px;
      border: 1px solid #ef4444;
      border-radius: 999px;
      background: #fff;
      color: #dc2626;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .job-cancel-btn:hover {
      background: #fee2e2;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      background: rgba(10, 20, 30, 0.88);
      color: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 99;
    }

    .toast.show { opacity: 1; }

    .settings-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.46);
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .settings-modal.show { display: flex; }

    .settings {
      width: min(960px, 94vw);
      max-height: 90vh;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfdff;
      display: grid;
      gap: 10px;
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.2);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #1d3550;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #33485a;
    }

    .setting-input {
      border: 1px solid #b9c5d2;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      min-width: 120px;
    }

    .setting-note {
      color: var(--muted);
      font-size: 12px;
    }

    .peer-list {
      display: grid;
      gap: 6px;
      width: min(100%, 760px);
    }

    .peer-item {
      border: 1px solid #d6e0ea;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .peer-main {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .peer-name {
      font-size: 12px;
      font-weight: 600;
      color: #203547;
      word-break: break-all;
    }

    .peer-meta {
      font-size: 11px;
      color: #617487;
      word-break: break-all;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 0 rgba(29, 78, 216, 0.0); }
      to { box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1); }
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.46);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .confirm-overlay.show { display: flex; }
    .confirm-box {
      background: #fbfdff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      width: min(360px, 90vw);
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.2);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .confirm-msg {
      font-size: 13px;
      color: var(--txt);
      line-height: 1.5;
    }
    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    @media (max-width: 640px) {
      .bottom {
        align-items: stretch;
        flex-wrap: wrap;
      }
      .tip {
        flex-basis: 100%;
      }
      .bottom-actions {
        width: 100%;
      }
      .btn.send,
      .btn.camera {
        flex: 1;
      }
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <div class="title">局域网文件传输</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="top-actions">
        <button class="btn" id="settingsBtn" type="button">设置</button>
        <div class="status" id="status">连接中...</div>
      </div>
    </div>

    <div class="qr-card" id="qrCard">
      <img class="qr-img" id="qrImage" alt="手机扫码二维码" />
      <div class="qr-text">
        <div class="qr-title">手机扫码打开上传页</div>
        <a class="qr-link" id="qrLink" target="_blank" rel="noopener noreferrer"></a>
        <div class="qr-meta">
          <span class="qr-expire" id="qrExpire">有效期剩余 --</span>
          <button class="btn qr-refresh" id="refreshQrBtn" type="button">刷新二维码</button>
        </div>
      </div>
    </div>

    <div class="records" id="records">
      <div class="empty" id="empty">暂无传输记录</div>
    </div>

    <div class="selection-bar" id="recordSelectionBar">
      <div class="selection-summary" id="recordSelectionSummary">已选择 0 条记录</div>
      <div class="selection-actions">
        <button class="btn danger" id="deleteSelectedRecordsBtn" type="button">删除选中</button>
        <button class="btn" id="cancelDeleteModeBtn" type="button">取消</button>
      </div>
    </div>

    <div class="drop-zone" id="dropZone">拖拽文件到此区域，立即发送到手机</div>

    <div class="upload-jobs" id="uploadJobs"></div>

    <div class="bottom">
      <div class="tip" id="tip"></div>
      <div class="bottom-actions">
        <button class="btn send" id="sendBtn" type="button">发送文件</button>
        <button class="btn camera" id="cameraBtn" type="button">拍照上传</button>
      </div>
      <input id="fileInput" type="file" multiple />
      <input id="cameraInput" type="file" accept="image/*" capture="environment" />
    </div>
  </div>

  <div class="settings-modal" id="settingsModal">
    <div class="settings" id="settingsPanel">
      <div class="settings-header">
        <span>设置</span>
        <button class="btn" id="closeSettingsBtn" type="button">关闭</button>
      </div>
      <div class="setting-row" id="limitRow">
        <span>上传限制</span>
        <input class="setting-input" id="uploadLimitGb" type="number" min="1" max="100" step="1" />
        <span>GB</span>
        <button class="btn" id="saveLimitBtn" type="button">保存限制</button>
      </div>
      <div class="setting-row" id="downloadDirRow">
        <span>下载目录</span>
        <input class="setting-input" id="downloadDirInput" type="text" placeholder="例如 C:\Users\YourName\Downloads" style="min-width: 320px;" />
        <button class="btn" id="pickDownloadDirBtn" type="button">选择文件夹</button>
        <button class="btn" id="saveDownloadDirBtn" type="button">保存路径</button>
        <button class="btn" id="openDownloadDirBtn" type="button">打开目录</button>
        <button class="btn" id="resetDownloadDirBtn" type="button">恢复默认</button>
      </div>
      <div class="setting-row" id="sendTargetRow">
        <span>发送目标</span>
        <select class="setting-input" id="sendTargetSelect" style="min-width: 240px;"></select>
      </div>
      <div class="setting-row" id="peerDiscoveryRow">
        <span>局域网电脑</span>
        <button class="btn" id="refreshPeersBtn" type="button">刷新列表</button>
        <div class="peer-list" id="peerDevices"></div>
      </div>
      <div class="setting-row" id="pairRequestsRow">
        <span>待确认配对</span>
        <div class="peer-list" id="pairRequests"></div>
      </div>
      <div class="setting-row" id="pairedDevicesRow">
        <span>已配对设备</span>
        <div class="peer-list" id="pairedDevices"></div>
      </div>
      <div class="setting-row" id="recordDeleteRow">
        <span>传输记录</span>
        <button class="btn danger" id="deleteRecordsBtn" type="button">删除记录</button>
      </div>
      <div class="setting-note" id="secureNote">默认下载目录为 Windows Downloads，上传上限默认 10GB；电脑互传可在上方设备列表发起并确认配对。</div>
    </div>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-msg" id="confirmMsg"></div>
      <div class="confirm-actions">
        <button class="btn" id="confirmCancelBtn" type="button">取消</button>
        <button class="btn danger" id="confirmOkBtn" type="button">确认</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script id="serverConfigData" type="application/json">
    {{ {
      "mobileUrl": mobile_url,
      "mobileQrDataUrl": mobile_qr_data_url,
      "tokenExpiresAt": token_expires_at,
      "sessionId": session_id,
      "accessDenied": access_denied,
      "accessDeniedReason": access_denied_reason
    } | tojson }}
  </script>

  <script>
    const serverConfig = (() => {
      const defaults = {
        mobileUrl: '',
        mobileQrDataUrl: '',
        tokenExpiresAt: 0,
        sessionId: '',
        accessDenied: false,
        accessDeniedReason: '',
      };
      const el = document.getElementById('serverConfigData');
      if (!el) return defaults;
      try {
        const parsed = JSON.parse(el.textContent || '{}');
        return { ...defaults, ...parsed };
      } catch (_) {
        return defaults;
      }
    })();

    const initialRole = detectRole();
    const state = {
      role: initialRole,
      ws: null,
      hbTimer: null,
      reconnectTimer: null,
      records: [],
      recordIdSet: new Set(),
      sessionId: serverConfig.sessionId || '',
      qrExpiresAt: Number(serverConfig.tokenExpiresAt || 0),
      qrRefreshInFlight: false,
      qrCountdownTimer: null,
      maxUploadBytes: 10 * 1024 * 1024 * 1024,
      downloadDir: '',
      defaultDownloadDir: '',
      uploadJobs: [],
      uploadJobCounter: 0,
      deviceId: initialRole === 'mobile' ? getOrCreateMobileDeviceId() : 'desktop',
      deviceName: initialRole === 'mobile' ? detectMobileDeviceName() : '电脑端',
      discoveredPeers: [],
      pairedPeers: [],
      pendingPairRequests: [],
      peerRefreshInFlight: false,
      peerPollTimer: null,
      recordDeleteMode: false,
      selectedRecordIds: new Set(),
      recordDeleteInFlight: false,
      desktopTargetDeviceId: (() => {
        try {
          const saved = String(localStorage.getItem('lft_desktop_target') || '').trim();
          return saved || 'mobile';
        } catch (_) {
          return 'mobile';
        }
      })(),
    };

    const ui = {
      records: document.getElementById('records'),
      empty: document.getElementById('empty'),
      sendBtn: document.getElementById('sendBtn'),
      cameraBtn: document.getElementById('cameraBtn'),
      fileInput: document.getElementById('fileInput'),
      cameraInput: document.getElementById('cameraInput'),
      status: document.getElementById('status'),
      meta: document.getElementById('meta'),
      tip: document.getElementById('tip'),
      dropZone: document.getElementById('dropZone'),
      uploadJobs: document.getElementById('uploadJobs'),
      toast: document.getElementById('toast'),
      qrCard: document.getElementById('qrCard'),
      qrImage: document.getElementById('qrImage'),
      qrLink: document.getElementById('qrLink'),
      qrExpire: document.getElementById('qrExpire'),
      refreshQrBtn: document.getElementById('refreshQrBtn'),
      settingsBtn: document.getElementById('settingsBtn'),
      settingsModal: document.getElementById('settingsModal'),
      closeSettingsBtn: document.getElementById('closeSettingsBtn'),
      settingsPanel: document.getElementById('settingsPanel'),
      limitRow: document.getElementById('limitRow'),
      uploadLimitGb: document.getElementById('uploadLimitGb'),
      saveLimitBtn: document.getElementById('saveLimitBtn'),
      downloadDirRow: document.getElementById('downloadDirRow'),
      downloadDirInput: document.getElementById('downloadDirInput'),
      pickDownloadDirBtn: document.getElementById('pickDownloadDirBtn'),
      saveDownloadDirBtn: document.getElementById('saveDownloadDirBtn'),
      openDownloadDirBtn: document.getElementById('openDownloadDirBtn'),
      resetDownloadDirBtn: document.getElementById('resetDownloadDirBtn'),
      sendTargetRow: document.getElementById('sendTargetRow'),
      sendTargetSelect: document.getElementById('sendTargetSelect'),
      peerDiscoveryRow: document.getElementById('peerDiscoveryRow'),
      refreshPeersBtn: document.getElementById('refreshPeersBtn'),
      peerDevices: document.getElementById('peerDevices'),
      pairRequestsRow: document.getElementById('pairRequestsRow'),
      pairRequests: document.getElementById('pairRequests'),
      pairedDevicesRow: document.getElementById('pairedDevicesRow'),
      pairedDevices: document.getElementById('pairedDevices'),
      recordDeleteRow: document.getElementById('recordDeleteRow'),
      deleteRecordsBtn: document.getElementById('deleteRecordsBtn'),
      recordSelectionBar: document.getElementById('recordSelectionBar'),
      recordSelectionSummary: document.getElementById('recordSelectionSummary'),
      deleteSelectedRecordsBtn: document.getElementById('deleteSelectedRecordsBtn'),
      cancelDeleteModeBtn: document.getElementById('cancelDeleteModeBtn'),
      secureNote: document.getElementById('secureNote'),
    };

    function detectRole() {
      const role = new URLSearchParams(location.search).get('role');
      if (role === 'desktop' || role === 'mobile') return role;
      return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
    }

    function makeFallbackUuid() {
      // 使用 crypto.getRandomValues 生成符合 UUID v4 规范的随机 ID
      const bytes = new Uint8Array(16);
      (window.crypto || window.msCrypto).getRandomValues(bytes);
      bytes[6] = (bytes[6] & 0x0f) | 0x40;
      bytes[8] = (bytes[8] & 0x3f) | 0x80;
      const hex = Array.from(bytes).map((b) => b.toString(16).padStart(2, '0')).join('');
      return `${hex.slice(0, 8)}-${hex.slice(8, 12)}-${hex.slice(12, 16)}-${hex.slice(16, 20)}-${hex.slice(20)}`;
    }

    function getOrCreateMobileDeviceId() {
      const key = 'lft_mobile_device_id';
      try {
        const existing = (localStorage.getItem(key) || '').trim();
        if (existing) return existing;
      } catch (_) {
      }
      const nextId = (window.crypto && typeof window.crypto.randomUUID === 'function')
        ? window.crypto.randomUUID()
        : makeFallbackUuid();
      try {
        localStorage.setItem(key, nextId);
      } catch (_) {
      }
      return nextId;
    }

    function detectMobileDeviceName() {
      const ua = navigator.userAgent || '';
      if (/iPhone/i.test(ua)) return 'iPhone';
      if (/iPad/i.test(ua)) return 'iPad';
      if (/Android/i.test(ua)) return 'Android';
      return '手机浏览器';
    }

    function fileNameFromPath(rawPath) {
      const text = String(rawPath || '').trim();
      if (!text) return 'file';
      const parts = text.split(/[/\\]/).filter(Boolean);
      return parts.length ? parts[parts.length - 1] : text;
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      if (bytes < 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
    }

    function showToast(text) {
      ui.toast.textContent = text;
      ui.toast.classList.add('show');
      setTimeout(() => ui.toast.classList.remove('show'), 1800);
    }

    // 替代原生 window.confirm 的自定义异步确认对话框
    function customConfirm(message) {
      return new Promise((resolve) => {
        const overlay = document.getElementById('confirmOverlay');
        const msg = document.getElementById('confirmMsg');
        const okBtn = document.getElementById('confirmOkBtn');
        const cancelBtn = document.getElementById('confirmCancelBtn');
        if (!overlay) { resolve(window.confirm(message)); return; }
        msg.textContent = message;
        overlay.classList.add('show');
        function cleanup(result) {
          overlay.classList.remove('show');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          resolve(result);
        }
        function onOk() { cleanup(true); }
        function onCancel() { cleanup(false); }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
      });
    }

    function setStatus(text, ok = false, err = false) {
      ui.status.textContent = text;
      ui.status.classList.toggle('ok', ok);
      ui.status.classList.toggle('err', err);
    }

    function syncDesktopTipText() {
      if (state.role !== 'desktop') return;
      if (state.recordDeleteMode) {
        ui.tip.textContent = '请选择要删除的历史记录，确认后仅删除记录，不删除实际文件。';
        return;
      }
      ui.tip.textContent = '可点击“发送文件”（桌面模式将直接引用原文件，不再复制）；也可拖拽上传；右键记录可打开文件夹。';
    }

    function persistDesktopTarget(deviceId) {
      const value = String(deviceId || 'mobile').trim() || 'mobile';
      state.desktopTargetDeviceId = value;
      try {
        localStorage.setItem('lft_desktop_target', value);
      } catch (_) {
      }
    }

    function toggleSettingsPanel(forceOpen) {
      if (!ui.settingsModal) return;
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !ui.settingsModal.classList.contains('show');
      ui.settingsModal.classList.toggle('show', shouldOpen);
      if (ui.settingsBtn) ui.settingsBtn.textContent = shouldOpen ? '关闭设置' : '设置';
      // 面板打开时才启动轮询，关闭时暂停，避免常驻 3 个请求/4s
      if (state.role === 'desktop') {
        if (shouldOpen) startPeerPolling();
        else stopPeerPolling();
      }
    }

    function createPeerItem(title, metaText, actionBuilder) {
      const item = document.createElement('div');
      item.className = 'peer-item';
      const main = document.createElement('div');
      main.className = 'peer-main';
      const nameEl = document.createElement('div');
      nameEl.className = 'peer-name';
      nameEl.textContent = title;
      const metaEl = document.createElement('div');
      metaEl.className = 'peer-meta';
      metaEl.textContent = metaText;
      main.appendChild(nameEl);
      main.appendChild(metaEl);
      item.appendChild(main);
      if (typeof actionBuilder === 'function') {
        const actions = document.createElement('div');
        actions.className = 'actions';
        actionBuilder(actions);
        item.appendChild(actions);
      }
      return item;
    }

    function renderDiscoveredPeers() {
      if (!ui.peerDevices) return;
      ui.peerDevices.innerHTML = '';
      const devices = Array.isArray(state.discoveredPeers) ? state.discoveredPeers : [];
      if (!devices.length) {
        ui.peerDevices.appendChild(createPeerItem('暂无在线电脑', '请稍候，设备会在局域网自动发现'));
        return;
      }
      for (const peer of devices) {
        const meta = `${peer.host}:${peer.port}${peer.paired ? ' · 已配对' : ''}`;
        const row = createPeerItem(peer.device_name || peer.device_id, meta, (actions) => {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.type = 'button';
          btn.textContent = peer.paired ? '重新请求配对' : '请求配对';
          btn.addEventListener('click', () => sendPairRequest(peer.device_id));
          actions.appendChild(btn);
        });
        ui.peerDevices.appendChild(row);
      }
    }

    function renderPendingPairRequests() {
      if (!ui.pairRequests) return;
      ui.pairRequests.innerHTML = '';
      const requests = Array.isArray(state.pendingPairRequests) ? state.pendingPairRequests : [];
      if (!requests.length) {
        ui.pairRequests.appendChild(createPeerItem('暂无待处理请求', '对端发起配对后会在这里显示'));
        return;
      }
      for (const req of requests) {
        const meta = `${req.from_host}:${req.from_port}`;
        const row = createPeerItem(req.from_device_name || req.from_device_id, meta, (actions) => {
          const acceptBtn = document.createElement('button');
          acceptBtn.className = 'btn';
          acceptBtn.type = 'button';
          acceptBtn.textContent = '同意';
          acceptBtn.addEventListener('click', () => respondPairRequest(req.request_id, true));
          const rejectBtn = document.createElement('button');
          rejectBtn.className = 'btn';
          rejectBtn.type = 'button';
          rejectBtn.textContent = '拒绝';
          rejectBtn.addEventListener('click', () => respondPairRequest(req.request_id, false));
          actions.appendChild(acceptBtn);
          actions.appendChild(rejectBtn);
        });
        ui.pairRequests.appendChild(row);
      }
    }

    function renderPairedPeers() {
      if (!ui.pairedDevices) return;
      ui.pairedDevices.innerHTML = '';
      const devices = Array.isArray(state.pairedPeers) ? state.pairedPeers : [];
      if (!devices.length) {
        ui.pairedDevices.appendChild(createPeerItem('暂无已配对设备', '完成一次对端确认后会持久保存'));
        return;
      }
      for (const peer of devices) {
        const status = peer.online ? '在线' : '离线';
        const meta = `${peer.host}:${peer.port} · ${status}`;
        const row = createPeerItem(peer.device_name || peer.device_id, meta, (actions) => {
          const removeBtn = document.createElement('button');
          removeBtn.className = 'btn danger';
          removeBtn.type = 'button';
          removeBtn.textContent = '删除配对';
          removeBtn.addEventListener('click', () => removePairedPeer(peer.device_id, peer.device_name || peer.device_id));
          actions.appendChild(removeBtn);
        });
        ui.pairedDevices.appendChild(row);
      }
    }

    function syncDesktopTargetOptions() {
      if (!ui.sendTargetSelect) return;
      const previous = String(state.desktopTargetDeviceId || ui.sendTargetSelect.value || 'mobile');
      const options = [{ value: 'mobile', label: '手机端（默认）' }];
      for (const peer of (Array.isArray(state.pairedPeers) ? state.pairedPeers : [])) {
        const suffix = peer.online ? '在线' : '离线';
        options.push({
          value: peer.device_id,
          label: `${peer.device_name || peer.device_id}（${suffix}）`,
        });
      }
      if (previous !== 'mobile' && !options.some((item) => item.value === previous)) {
        options.push({ value: previous, label: `${previous.slice(0, 8)}（离线）` });
      }
      // 只在选项内容实际发生变化时才重建，避免打断用户正在进行的下拉操作
      const existingValues = Array.from(ui.sendTargetSelect.options).map((o) => `${o.value}::${o.textContent}`).join('|');
      const newValues = options.map((o) => `${o.value}::${o.label}`).join('|');
      if (existingValues !== newValues) {
        ui.sendTargetSelect.innerHTML = '';
        for (const option of options) {
          const el = document.createElement('option');
          el.value = option.value;
          el.textContent = option.label;
          ui.sendTargetSelect.appendChild(el);
        }
      }
      const exists = options.some((item) => item.value === previous);
      if (exists) {
        persistDesktopTarget(previous);
      } else if (previous !== 'mobile' && state.pairedPeers.length === 1) {
        persistDesktopTarget(String(state.pairedPeers[0].device_id || 'mobile'));
      } else {
        persistDesktopTarget('mobile');
      }
      ui.sendTargetSelect.value = state.desktopTargetDeviceId;
    }

    function renderPeerState() {
      syncDesktopTargetOptions();
      renderDiscoveredPeers();
      renderPendingPairRequests();
      renderPairedPeers();
    }

    async function refreshPeerState(silent = true) {
      if (state.role !== 'desktop' || state.peerRefreshInFlight) return;
      state.peerRefreshInFlight = true;
      if (ui.refreshPeersBtn) ui.refreshPeersBtn.disabled = true;
      try {
        const [discoveredResp, pairedResp, pendingResp] = await Promise.all([
          fetch('/peers/discovered', { headers: authHeaders() }),
          fetch('/peers/paired', { headers: authHeaders() }),
          fetch('/pairing/pending', { headers: authHeaders() }),
        ]);
        if (discoveredResp.ok) {
          const discoveredData = await discoveredResp.json();
          state.discoveredPeers = Array.isArray(discoveredData.devices) ? discoveredData.devices : [];
        }
        if (pairedResp.ok) {
          const pairedData = await pairedResp.json();
          state.pairedPeers = Array.isArray(pairedData.devices) ? pairedData.devices : [];
        }
        if (pendingResp.ok) {
          const pendingData = await pendingResp.json();
          state.pendingPairRequests = Array.isArray(pendingData.requests) ? pendingData.requests : [];
        }
        renderPeerState();
      } catch (err) {
        console.error(err);
        if (!silent) showToast('设备列表刷新失败');
      } finally {
        state.peerRefreshInFlight = false;
        if (ui.refreshPeersBtn) ui.refreshPeersBtn.disabled = false;
      }
    }

    async function sendPairRequest(targetDeviceId) {
      const deviceId = String(targetDeviceId || '').trim();
      if (!deviceId) return;
      try {
        const resp = await fetch('/peers/pair-request', {
          method: 'POST',
          headers: {
            ...authHeaders(),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ target_device_id: deviceId }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `请求失败(${resp.status})`);
        showToast(`已向 ${data.target_device_name || '目标设备'} 发送配对请求`);
      } catch (err) {
        console.error(err);
        showToast('发送配对请求失败');
      } finally {
        refreshPeerState(true);
      }
    }

    async function respondPairRequest(requestId, accepted) {
      const id = String(requestId || '').trim();
      if (!id) return;
      try {
        const resp = await fetch('/pairing/respond', {
          method: 'POST',
          headers: {
            ...authHeaders(),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ request_id: id, accepted: !!accepted }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `处理失败(${resp.status})`);
        showToast(accepted ? '已同意配对' : '已拒绝配对');
      } catch (err) {
        console.error(err);
        showToast('处理配对请求失败');
      } finally {
        refreshPeerState(true);
      }
    }

    async function removePairedPeer(deviceId, deviceName) {
      const id = String(deviceId || '').trim();
      if (!id) return;
      if (!await customConfirm(`确认删除与“${deviceName || id}”的配对关系吗？`)) return;
      try {
        const resp = await fetch(`/peers/paired/${encodeURIComponent(id)}`, {
          method: 'DELETE',
          headers: authHeaders(),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `删除失败(${resp.status})`);
        showToast(`已删除 ${deviceName || id} 的配对`);
      } catch (err) {
        console.error(err);
        showToast('删除配对失败');
      } finally {
        refreshPeerState(true);
      }
    }

    function startPeerPolling() {
      if (state.peerPollTimer) clearInterval(state.peerPollTimer);
      refreshPeerState(true);
      state.peerPollTimer = setInterval(() => refreshPeerState(true), 4000);
    }

    function stopPeerPolling() {
      if (state.peerPollTimer) {
        clearInterval(state.peerPollTimer);
        state.peerPollTimer = null;
      }
    }

    function syncRecordSelectionBar() {
      if (!ui.recordSelectionBar || !ui.recordSelectionSummary) return;
      const selectedCount = state.selectedRecordIds.size;
      ui.recordSelectionSummary.textContent = `已选择 ${selectedCount} 条记录`;
      ui.recordSelectionBar.classList.toggle('show', state.role === 'desktop' && state.recordDeleteMode);
      if (ui.deleteSelectedRecordsBtn) {
        ui.deleteSelectedRecordsBtn.disabled = state.recordDeleteInFlight || selectedCount === 0;
      }
    }

    function setRecordDeleteMode(enabled) {
      if (state.role !== 'desktop') return;
      const nextEnabled = !!enabled;
      if (!nextEnabled) {
        state.selectedRecordIds.clear();
        state.recordDeleteInFlight = false;
      }
      if (state.recordDeleteMode !== nextEnabled) {
        state.recordDeleteMode = nextEnabled;
        renderRecords();
      }
      syncRecordSelectionBar();
      syncDesktopTipText();
    }

    function toggleRecordSelection(recordId) {
      if (!state.recordDeleteMode) return;
      const id = String(recordId || '').trim();
      if (!id || !state.recordIdSet.has(id)) return;
      if (state.selectedRecordIds.has(id)) state.selectedRecordIds.delete(id);
      else state.selectedRecordIds.add(id);
      const node = ui.records.querySelector(`[data-record-id="${CSS.escape(id)}"]`);
      if (node) node.classList.toggle('selected', state.selectedRecordIds.has(id));
      syncRecordSelectionBar();
    }

    function beginDeleteRecordsFlow() {
      if (state.role !== 'desktop') return;
      if (!state.records.length) {
        showToast('暂无可删除的历史记录');
        return;
      }
      toggleSettingsPanel(false);
      setRecordDeleteMode(true);
      showToast('已进入删除模式，请选择记录');
    }

    async function deleteSelectedRecords() {
      if (state.role !== 'desktop' || !state.recordDeleteMode || state.recordDeleteInFlight) return;
      const ids = Array.from(state.selectedRecordIds);
      if (!ids.length) {
        showToast('请先选择要删除的记录');
        return;
      }
      if (!await customConfirm(`确认删除选中的 ${ids.length} 条历史记录吗？此操作不会删除实际文件。`)) return;

      state.recordDeleteInFlight = true;
      syncRecordSelectionBar();
      try {
        const resp = await fetch('/records/delete', {
          method: 'POST',
          headers: {
            ...authHeaders(),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ ids }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `删除失败(${resp.status})`);
        const deletedIds = Array.isArray(data.deleted_ids) ? data.deleted_ids : [];
        const notFoundIds = Array.isArray(data.not_found_ids) ? data.not_found_ids : [];
        for (const recordId of deletedIds) {
          removeRecord(recordId);
        }
        if (!deletedIds.length) {
          showToast('未找到可删除的记录');
          return;
        }
        const suffix = notFoundIds.length ? `，${notFoundIds.length} 条已不存在` : '';
        showToast(`已删除 ${deletedIds.length} 条记录${suffix}`);
        setRecordDeleteMode(false);
      } catch (err) {
        console.error(err);
        showToast('删除记录失败');
      } finally {
        state.recordDeleteInFlight = false;
        syncRecordSelectionBar();
      }
    }

    function createRecordNode(record) {
      const row = document.createElement('div');
      row.className = `row ${record.source === 'desktop' ? 'desktop' : 'mobile'}`;
      row.dataset.recordId = record.id;
      if (state.role === 'desktop' && state.recordDeleteMode) {
        row.classList.add('selectable');
        if (state.selectedRecordIds.has(record.id)) {
          row.classList.add('selected');
        }
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = record.name;
      if (state.role === 'desktop' && !state.recordDeleteMode) {
        name.classList.add('clickable');
        name.title = '左键打开文件';
        name.addEventListener('click', () => openRecordFile(record));
      }

      const desc = document.createElement('div');
      desc.className = 'desc';
      const actionLabel = record.direction || '上传';
      const deviceLabel = record.device_name || (record.source === 'desktop' ? '电脑端' : '手机端');
      const statusLabel = record.status ? ` · ${record.status}` : '';
      desc.textContent = `${actionLabel} · ${deviceLabel} · ${fmtSize(Math.max(0, Number(record.size) || 0))} · ${record.created_at}${statusLabel}`;

      const actions = document.createElement('div');
      actions.className = 'actions';

      const recordStatus = String(record.status || '').trim();
      const canOpenDownloadedFile = state.role === 'desktop' && (recordStatus === '已下载' || recordStatus === '已保存');
      if (canOpenDownloadedFile && !state.recordDeleteMode) {
        const openBtn = document.createElement('button');
        openBtn.className = 'btn';
        openBtn.textContent = '打开';
        openBtn.addEventListener('click', () => openRecordFile(record));
        actions.appendChild(openBtn);
      } else if (record.download_url && !state.recordDeleteMode) {
        const dlBtn = document.createElement('button');
        dlBtn.className = 'btn';
        dlBtn.textContent = '下载';
        dlBtn.addEventListener('click', () => triggerDownload(record));
        actions.appendChild(dlBtn);
      }
      bubble.appendChild(name);
      bubble.appendChild(desc);
      if (actions.childElementCount > 0) {
        bubble.appendChild(actions);
      }
      row.appendChild(bubble);
      if (state.role === 'desktop' && state.recordDeleteMode) {
        row.addEventListener('click', () => toggleRecordSelection(record.id));
      } else if (state.role === 'desktop') {
        row.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          openRecordFolder(record);
        });
      }
      return row;
    }

    function renderRecords() {
      // 全量重建：仅在初始加载或批量重置时调用，使用 DocumentFragment 减少回流
      ui.records.innerHTML = '';
      if (state.records.length === 0) {
        ui.records.appendChild(ui.empty);
        ui.empty.style.display = 'block';
        syncRecordSelectionBar();
        return;
      }
      ui.empty.style.display = 'none';
      const frag = document.createDocumentFragment();
      for (const record of state.records) {
        frag.appendChild(createRecordNode(record));
      }
      ui.records.appendChild(frag);
      ui.records.scrollTop = ui.records.scrollHeight;
      syncRecordSelectionBar();
    }

    function addRecord(record, notify = true) {
      if (state.recordIdSet.has(record.id)) return;
      state.recordIdSet.add(record.id);
      state.records.push(record);
      if (notify) {
        // 增量追加节点，避免全量重建列表
        ui.empty.style.display = 'none';
        ui.records.appendChild(createRecordNode(record));
        ui.records.scrollTop = ui.records.scrollHeight;
        if (state.role === 'mobile' && record.source === 'desktop') {
          showToast(`收到文件：${record.name}`);
          notifyInBackground(record);
        }
      }
      syncRecordSelectionBar();
    }

    function updateRecord(record) {
      const id = String(record?.id || '').trim();
      if (!id) return;
      const idx = state.records.findIndex((item) => item.id === id);
      if (idx < 0) {
        addRecord(record, false);
        renderRecords();
        return;
      }
      const next = { ...state.records[idx], ...record };
      state.records[idx] = next;
      const oldNode = ui.records.querySelector(`[data-record-id="${CSS.escape(id)}"]`);
      if (oldNode) {
        oldNode.replaceWith(createRecordNode(next));
      } else {
        renderRecords();
      }
    }

    function removeRecord(recordId) {
      if (!state.recordIdSet.has(recordId)) return;
      state.recordIdSet.delete(recordId);
      state.records = state.records.filter((item) => item.id !== recordId);
      state.selectedRecordIds.delete(recordId);
      // 只移除对应节点，无需重建整个列表
      const node = ui.records.querySelector(`[data-record-id="${CSS.escape(recordId)}"]`);
      if (node) node.remove();
      if (state.records.length === 0) {
        ui.records.appendChild(ui.empty);
        ui.empty.style.display = 'block';
      }
      syncRecordSelectionBar();
    }

    async function triggerDownload(record) {
      try {
        if (state.role === 'mobile') {
          await downloadFileInBrowserWithSpeed(record);
          showToast(`下载完成：${record.name}`);
          return;
        }

        const data = await saveFileToDesktopWithSpeed(record);
        if (data && data.record) {
          updateRecord(data.record);
        }
        const savedName = data.file_name || record.name;
        showToast(`已下载：${savedName}`);
      } catch (err) {
        if (isCancelError(err)) {
          showToast('已取消下载');
          return;
        }
        console.error(err);
        showToast('下载失败');
      }
    }

    async function openRecordFolder(record) {
      if (state.role !== 'desktop') return;
      try {
        const resp = await fetch(`/records/${encodeURIComponent(record.id)}/open-folder`, {
          method: 'POST',
          headers: authHeaders(),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `打开失败(${resp.status})`);
      } catch (err) {
        console.error(err);
        showToast('打开文件夹失败');
      }
    }

    async function openRecordFile(record) {
      if (state.role !== 'desktop') return;
      try {
        const resp = await fetch(`/records/${encodeURIComponent(record.id)}/open-file`, {
          method: 'POST',
          headers: authHeaders(),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `打开失败(${resp.status})`);
      } catch (err) {
        console.error(err);
        showToast('打开文件失败');
      }
    }

    function authHeaders() {
      const headers = {};
      if (state.sessionId) headers['X-Session-Id'] = state.sessionId;
      if (state.role === 'desktop' && state.desktopTargetDeviceId && state.desktopTargetDeviceId !== 'mobile') {
        headers['X-Target-Device-Id'] = state.desktopTargetDeviceId;
      }
      if (state.role === 'mobile' && state.deviceId) {
        headers['X-Device-Id'] = state.deviceId;
        if (state.deviceName) headers['X-Device-Name'] = state.deviceName;
      }
      return headers;
    }

    function isCancelError(err) {
      return !!(err && (err.code === 'CANCELED' || err.name === 'AbortError'));
    }

    function buildCancelError(message) {
      const error = new Error(message || '操作已取消');
      error.code = 'CANCELED';
      return error;
    }

    function isTransferActive(job) {
      return !!job && (job.status === 'uploading' || job.status === 'downloading');
    }

    function createTransferJob({ name, size, kind, cancelable = false }) {
      const id = `upload-${Date.now()}-${state.uploadJobCounter++}`;
      state.uploadJobs.push({
        id,
        name,
        size: Math.max(0, Number(size) || 0),
        kind: kind === 'download' ? 'download' : 'upload',
        loaded: 0,
        percent: 0,
        speedBps: 0,
        startedAt: Date.now(),
        lastTickAt: Date.now(),
        status: kind === 'download' ? 'downloading' : 'uploading',
        cancelable: !!cancelable,
        cancelRequested: false,
        aborter: null,
      });
      renderUploadJobs();
      return id;
    }

    function getTransferJob(jobId) {
      return state.uploadJobs.find((item) => item.id === jobId);
    }

    function updateTransferJob(jobId, patch) {
      const job = getTransferJob(jobId);
      if (!job) return;
      Object.assign(job, patch);
      if (typeof patch.loaded === 'number' && job.size > 0 && typeof patch.percent !== 'number') {
        job.percent = Math.min(100, (job.loaded / job.size) * 100);
      }
      renderUploadJobs();
    }

    function cancelTransfer(jobId) {
      const job = getTransferJob(jobId);
      if (!job || !job.cancelable || !isTransferActive(job)) return;
      job.cancelRequested = true;
      job.cancelable = false;
      const aborter = job.aborter;
      job.aborter = null;
      renderUploadJobs();
      if (typeof aborter === 'function') {
        try {
          aborter();
        } catch (_) {
        }
      }
    }

    function updateTransferProgress(jobId, loaded, total) {
      const job = getTransferJob(jobId);
      if (!job) return;
      const now = Date.now();
      const prevLoaded = Math.max(0, Number(job.loaded) || 0);
      const prevTick = Number(job.lastTickAt) || Number(job.startedAt) || now;
      const safeLoaded = Math.max(0, Number(loaded) || 0);
      const safeTotal = Math.max(0, Number(total) || 0) || job.size || safeLoaded;
      const deltaBytes = Math.max(0, safeLoaded - prevLoaded);
      const deltaMs = Math.max(1, now - prevTick);
      const instantBps = (deltaBytes * 1000) / deltaMs;
      const blendedBps = job.speedBps > 0 ? (job.speedBps * 0.72 + instantBps * 0.28) : instantBps;

      job.loaded = Math.min(safeLoaded, safeTotal);
      job.percent = safeTotal > 0 ? Math.min(100, (job.loaded / safeTotal) * 100) : 0;
      job.speedBps = Number.isFinite(blendedBps) ? Math.max(0, blendedBps) : Math.max(0, Number(job.speedBps) || 0);
      job.lastTickAt = now;
      // 使用 rAF 节流，避免高频进度事件导致每帧多次重建 DOM
      scheduleRenderUploadJobs();
    }

    function removeTransferJob(jobId) {
      const next = state.uploadJobs.filter((item) => item.id !== jobId);
      if (next.length === state.uploadJobs.length) return;
      state.uploadJobs = next;
      renderUploadJobs();
    }

    function scheduleTransferJobRemoval(jobId, delayMs) {
      setTimeout(() => removeTransferJob(jobId), delayMs);
    }

    function transferStatusLabel(job) {
      if (job.status === 'done') return job.kind === 'download' ? '下载完成' : '上传完成';
      if (job.status === 'fail') return job.kind === 'download' ? '下载失败' : '上传失败';
      if (job.status === 'canceled') return job.kind === 'download' ? '下载已取消' : '上传已取消';
      return job.kind === 'download' ? '下载中' : '上传中';
    }

    function formatPercent(percent) {
      const safe = Math.max(0, Math.min(100, Number(percent) || 0));
      return `${Math.round(safe)}%`;
    }

    function fmtSpeed(bytesPerSecond) {
      const speed = Number(bytesPerSecond);
      if (!Number.isFinite(speed) || speed <= 0) return '--';
      return `${fmtSize(speed)}/s`;
    }

    function averageSpeedBps(startedAt, bytes) {
      const started = Number(startedAt) || Date.now();
      const totalBytes = Math.max(0, Number(bytes) || 0);
      const elapsedMs = Math.max(1, Date.now() - started);
      return totalBytes > 0 ? (totalBytes * 1000) / elapsedMs : 0;
    }

    async function saveFileToDesktopWithSpeed(record) {
      const totalBytes = Math.max(0, Number(record.size) || 0);
      const jobId = createTransferJob({
        name: record.name,
        size: totalBytes,
        kind: 'download',
      });
      const startedAt = Date.now();
      try {
        const resp = await fetch(`/files/${encodeURIComponent(record.id)}/save`, {
          method: 'POST',
          headers: authHeaders(),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `保存失败(${resp.status})`);

        updateTransferJob(jobId, {
          loaded: totalBytes,
          percent: 100,
          speedBps: averageSpeedBps(startedAt, totalBytes),
          status: 'done',
          lastTickAt: Date.now(),
        });
        scheduleTransferJobRemoval(jobId, 3500);
        return data;
      } catch (err) {
        updateTransferJob(jobId, { status: 'fail' });
        scheduleTransferJobRemoval(jobId, 7000);
        throw err;
      }
    }

    function downloadFileInBrowserWithSpeed(record) {
      const totalBytes = Math.max(0, Number(record.size) || 0);
      const jobId = createTransferJob({
        name: record.name,
        size: totalBytes,
        kind: 'download',
        cancelable: true,
      });
      const startedAt = Date.now();

      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', `/files/${encodeURIComponent(record.id)}`, true);
        xhr.responseType = 'blob';
        const headers = authHeaders();
        for (const [key, value] of Object.entries(headers)) {
          xhr.setRequestHeader(key, value);
        }
        updateTransferJob(jobId, { aborter: () => xhr.abort() });

        xhr.onprogress = (event) => {
          const progressTotal = event.lengthComputable && event.total > 0 ? event.total : totalBytes;
          updateTransferProgress(jobId, event.loaded, progressTotal);
        };

        xhr.onerror = () => {
          updateTransferJob(jobId, { status: 'fail', cancelable: false, aborter: null });
          scheduleTransferJobRemoval(jobId, 7000);
          reject(new Error('网络错误'));
        };

        xhr.onabort = () => {
          const job = getTransferJob(jobId);
          const canceled = !!(job && job.cancelRequested);
          if (canceled) {
            updateTransferJob(jobId, { status: 'canceled', speedBps: 0, cancelable: false, aborter: null });
            scheduleTransferJobRemoval(jobId, 4500);
            reject(buildCancelError('下载已取消'));
            return;
          }
          updateTransferJob(jobId, { status: 'fail', cancelable: false, aborter: null });
          scheduleTransferJobRemoval(jobId, 7000);
          reject(new Error('下载中断'));
        };

        xhr.onload = () => {
          if (xhr.status < 200 || xhr.status >= 300) {
            updateTransferJob(jobId, { status: 'fail', cancelable: false, aborter: null });
            scheduleTransferJobRemoval(jobId, 7000);
            reject(new Error(`下载失败(${xhr.status})`));
            return;
          }

          const blob = xhr.response instanceof Blob ? xhr.response : new Blob([xhr.response || '']);
          const loadedBytes = totalBytes > 0 ? totalBytes : (blob.size || 0);
          const currentJob = getTransferJob(jobId);
          const smoothSpeed = currentJob ? Number(currentJob.speedBps) || 0 : 0;
          updateTransferJob(jobId, {
            loaded: loadedBytes,
            percent: 100,
            speedBps: Math.max(smoothSpeed, averageSpeedBps(startedAt, loadedBytes)),
            status: 'done',
            cancelable: false,
            aborter: null,
            lastTickAt: Date.now(),
          });
          scheduleTransferJobRemoval(jobId, 3500);

          const blobUrl = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = record.name || 'downloaded_file';
          link.style.display = 'none';
          document.body.appendChild(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(blobUrl), 3000);
          resolve();
        };

        xhr.send();
      });
    }

    // 上传任务节点缓存，避免每次进度更新全量重建 DOM
    const _uploadJobNodes = new Map();
    let _uploadJobsRafPending = false;

    function scheduleRenderUploadJobs() {
      if (_uploadJobsRafPending) return;
      _uploadJobsRafPending = true;
      requestAnimationFrame(() => {
        _uploadJobsRafPending = false;
        renderUploadJobs();
      });
    }

    function _buildJobClassName(job) {
      return ['upload-job', job.status === 'done' ? 'done' : '', job.status === 'fail' ? 'fail' : '', job.status === 'canceled' ? 'canceled' : ''].filter(Boolean).join(' ');
    }

    function _buildJobMetaText(job) {
      const actionText = job.kind === 'download' ? '下载' : '上传';
      const speedText = job.status === 'done'
        ? `平均${actionText}速度 ${fmtSpeed(job.speedBps)}`
        : `${actionText}速度 ${fmtSpeed(job.speedBps)}`;
      return `${fmtSize(job.loaded)} / ${fmtSize(job.size)} · ${formatPercent(job.percent)} · ${speedText}`;
    }

    function _buildJobFillPercent(job) {
      const isActive = job.status === 'uploading' || job.status === 'downloading';
      const shownPercent = isActive ? Math.max(2, job.percent) : job.percent;
      return Math.max(0, Math.min(100, shownPercent));
    }

    function _buildCancelBtn(job) {
      if (!(job.kind === 'download' && job.cancelable && isTransferActive(job))) return null;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'job-cancel-btn';
      btn.textContent = '×';
      btn.setAttribute('aria-label', '取消');
      btn.addEventListener('click', () => cancelTransfer(job.id));
      return btn;
    }

    function _buildJobNode(job) {
      const node = document.createElement('div');
      node.dataset.jobId = job.id;
      node.className = _buildJobClassName(job);

      const head = document.createElement('div');
      head.className = 'upload-head';
      const name = document.createElement('span');
      name.className = 'upload-name';
      name.textContent = job.name;
      const status = document.createElement('span');
      status.className = 'upload-status';
      status.textContent = transferStatusLabel(job);
      head.appendChild(name);
      head.appendChild(status);

      const cancelBtn = _buildCancelBtn(job);
      if (cancelBtn) node.appendChild(cancelBtn);

      const meta = document.createElement('div');
      meta.className = 'upload-meta';
      meta.textContent = _buildJobMetaText(job);

      const track = document.createElement('div');
      track.className = 'progress-track';
      const fill = document.createElement('div');
      fill.className = 'progress-fill';
      fill.style.width = `${_buildJobFillPercent(job)}%`;
      track.appendChild(fill);

      node.appendChild(head);
      node.appendChild(meta);
      node.appendChild(track);
      return node;
    }

    function _updateJobNodeInPlace(node, job) {
      node.className = _buildJobClassName(job);
      const statusEl = node.querySelector('.upload-status');
      if (statusEl) statusEl.textContent = transferStatusLabel(job);
      const metaEl = node.querySelector('.upload-meta');
      if (metaEl) metaEl.textContent = _buildJobMetaText(job);
      const fillEl = node.querySelector('.progress-fill');
      if (fillEl) fillEl.style.width = `${_buildJobFillPercent(job)}%`;
      // 同步取消按鈕显隐
      const existingCancel = node.querySelector('.job-cancel-btn');
      const shouldShow = job.kind === 'download' && job.cancelable && isTransferActive(job);
      if (shouldShow && !existingCancel) {
        const btn = _buildCancelBtn(job);
        if (btn) node.insertBefore(btn, node.querySelector('.upload-head'));
      } else if (!shouldShow && existingCancel) {
        existingCancel.remove();
      }
    }

    function renderUploadJobs() {
      if (!state.uploadJobs.length) {
        ui.uploadJobs.classList.remove('show');
        _uploadJobNodes.forEach((node) => { if (node.parentNode) node.remove(); });
        _uploadJobNodes.clear();
        return;
      }
      ui.uploadJobs.classList.add('show');

      // 移除已删除的任务对应节点
      const currentIds = new Set(state.uploadJobs.map((j) => j.id));
      _uploadJobNodes.forEach((node, id) => {
        if (!currentIds.has(id)) {
          if (node.parentNode) node.remove();
          _uploadJobNodes.delete(id);
        }
      });

      // 原地更新已有节点，新增任务创建节点
      for (const job of state.uploadJobs) {
        const existing = _uploadJobNodes.get(job.id);
        if (existing) {
          _updateJobNodeInPlace(existing, job);
        } else {
          const node = _buildJobNode(job);
          _uploadJobNodes.set(job.id, node);
          ui.uploadJobs.appendChild(node);
        }
      }
    }

    function sendFileWithProgress(file, source = state.role) {
      const totalBytes = Math.max(0, Number(file.size) || 0);
      const jobId = createTransferJob({
        name: file.name,
        size: totalBytes,
        kind: 'upload',
        cancelable: true,
      });

      return new Promise((resolve, reject) => {
        const form = new FormData();
        form.append('file', file, file.name);
        form.append('source', source);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload', true);
        const headers = authHeaders();
        for (const [key, value] of Object.entries(headers)) {
          xhr.setRequestHeader(key, value);
        }
        updateTransferJob(jobId, { aborter: () => xhr.abort() });

        xhr.upload.onprogress = (event) => {
          const progressTotal = event.lengthComputable && event.total > 0 ? event.total : totalBytes;
          updateTransferProgress(jobId, event.loaded, progressTotal);
        };

        xhr.onerror = () => {
          updateTransferJob(jobId, { status: 'fail', cancelable: false, aborter: null });
          scheduleTransferJobRemoval(jobId, 6000);
          reject(new Error('网络错误'));
        };

        xhr.onabort = () => {
          const job = getTransferJob(jobId);
          const canceled = !!(job && job.cancelRequested);
          if (canceled) {
            updateTransferJob(jobId, { status: 'canceled', speedBps: 0, cancelable: false, aborter: null });
            scheduleTransferJobRemoval(jobId, 4500);
            reject(buildCancelError('上传已取消'));
            return;
          }
          updateTransferJob(jobId, { status: 'fail', cancelable: false, aborter: null });
          scheduleTransferJobRemoval(jobId, 6000);
          reject(new Error('上传中断'));
        };

        xhr.onload = () => {
          const data = (() => {
            try {
              return JSON.parse(xhr.responseText || '{}');
            } catch (_) {
              return {};
            }
          })();

          if (xhr.status >= 200 && xhr.status < 300) {
            const currentJob = getTransferJob(jobId);
            const smoothSpeed = currentJob ? Number(currentJob.speedBps) || 0 : 0;
            updateTransferJob(jobId, {
              loaded: totalBytes,
              percent: 100,
              speedBps: Math.max(smoothSpeed, averageSpeedBps(currentJob ? currentJob.startedAt : Date.now(), totalBytes)),
              status: 'done',
              cancelable: false,
              aborter: null,
              lastTickAt: Date.now(),
            });
            scheduleTransferJobRemoval(jobId, 3500);
            resolve(data);
            return;
          }

          const message = data.error || `上传失败(${xhr.status})`;
          updateTransferJob(jobId, { status: 'fail', cancelable: false, aborter: null });
          scheduleTransferJobRemoval(jobId, 7000);
          reject(new Error(message));
        };

        xhr.send(form);
      });
    }


    function fmtLeftSeconds(left) {
      if (left <= 0) return '已过期';
      const mm = Math.floor(left / 60);
      const ss = left % 60;
      return `${mm}:${String(ss).padStart(2, '0')}`;
    }

    function tickQrCountdown() {
      if (state.role !== 'desktop') return;
      if (!ui.qrExpire) return;
      const now = Math.floor(Date.now() / 1000);
      const left = Math.max(0, state.qrExpiresAt - now);
      ui.qrExpire.textContent = `有效期剩余 ${fmtLeftSeconds(left)}`;
      if (left === 0 && !state.qrRefreshInFlight) {
        refreshQrPayload();
      }
    }

    function startQrCountdown() {
      if (state.qrCountdownTimer) clearInterval(state.qrCountdownTimer);
      tickQrCountdown();
      state.qrCountdownTimer = setInterval(tickQrCountdown, 1000);
    }

    function applyQrPayload(payload) {
      if (!payload || !payload.mobile_url || !payload.mobile_qr_data_url) return;
      serverConfig.mobileUrl = payload.mobile_url;
      serverConfig.mobileQrDataUrl = payload.mobile_qr_data_url;
      state.qrExpiresAt = Number(payload.token_expires_at || 0);
      ui.qrCard.classList.add('show');
      ui.qrImage.src = serverConfig.mobileQrDataUrl;
      ui.qrLink.href = serverConfig.mobileUrl;
      ui.qrLink.textContent = '打开手机上传页';
      tickQrCountdown();
    }

    async function refreshQrPayload() {
      if (state.role !== 'desktop' || state.qrRefreshInFlight) return;
      state.qrRefreshInFlight = true;
      if (ui.refreshQrBtn) ui.refreshQrBtn.disabled = true;
      try {
        const resp = await fetch('/auth/mobile-token');
        if (!resp.ok) throw new Error(`refresh failed: ${resp.status}`);
        const payload = await resp.json();
        applyQrPayload(payload);
      } catch (err) {
        console.error(err);
      } finally {
        state.qrRefreshInFlight = false;
        if (ui.refreshQrBtn) ui.refreshQrBtn.disabled = false;
      }
    }

    async function uploadFiles(files, source = state.role) {
      for (const file of files) {
        if (file.size > state.maxUploadBytes) {
          showToast(`${file.name} 超过上传上限`);
          continue;
        }

        try {
          await sendFileWithProgress(file, source);
          showToast(`${file.name} 上传成功`);
        } catch (err) {
          if (isCancelError(err)) {
            showToast(`${file.name} 已取消`);
            continue;
          }
          const message = (err && err.message) ? err.message : '未知错误';
          showToast(`${file.name} 上传失败：${message}`);
          console.error(err);
        }
      }
    }

    function hasDesktopUploadPicker() {
      return !!(window.pywebview && window.pywebview.api && typeof window.pywebview.api.choose_upload_files === 'function');
    }

    async function uploadDesktopPathNoCopy(filePath) {
      const displayName = fileNameFromPath(filePath);
      const jobId = createTransferJob({
        name: displayName,
        size: 0,
        kind: 'upload',
      });
      const startedAt = Date.now();
      try {
        const resp = await fetch('/upload-desktop-path', {
          method: 'POST',
          headers: {
            ...authHeaders(),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ file_path: filePath }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `上传失败(${resp.status})`);
        const finalSize = Math.max(0, Number(data?.record?.size) || 0);
        updateTransferJob(jobId, {
          size: finalSize,
          loaded: finalSize,
          percent: 100,
          speedBps: averageSpeedBps(startedAt, finalSize),
          status: 'done',
          cancelable: false,
          aborter: null,
          lastTickAt: Date.now(),
        });
        scheduleTransferJobRemoval(jobId, 3500);
        return data;
      } catch (err) {
        updateTransferJob(jobId, { status: 'fail', cancelable: false, aborter: null });
        scheduleTransferJobRemoval(jobId, 7000);
        throw err;
      }
    }

    async function uploadDesktopPathsNoCopy(paths) {
      const normalized = (Array.isArray(paths) ? paths : [])
        .map((p) => String(p || '').trim())
        .filter((p) => p.length > 0);
      for (const filePath of normalized) {
        try {
          await uploadDesktopPathNoCopy(filePath);
          showToast(`${fileNameFromPath(filePath)} 上传成功`);
        } catch (err) {
          console.error(err);
          const message = (err && err.message) ? err.message : '未知错误';
          showToast(`${fileNameFromPath(filePath)} 上传失败：${message}`);
        }
      }
    }

    async function pickDesktopFilesNoCopy() {
      if (!hasDesktopUploadPicker()) {
        ui.fileInput.click();
        return;
      }
      const current = (ui.downloadDirInput.value || state.downloadDir || state.defaultDownloadDir || '').trim();
      try {
        const selected = await window.pywebview.api.choose_upload_files(current);
        const picked = Array.isArray(selected) ? selected : (selected ? [selected] : []);
        if (!picked.length) return;
        await uploadDesktopPathsNoCopy(picked);
      } catch (err) {
        console.error(err);
        showToast('选择文件失败');
      }
    }

    function wsUrl() {
      const p = location.protocol === 'https:' ? 'wss' : 'ws';
      const url = new URL(`${p}://${location.host}/ws`);
      if (state.sessionId) url.searchParams.set('session_id', state.sessionId);
      if (state.role === 'mobile' && state.deviceId) url.searchParams.set('device_id', state.deviceId);
      return url.toString();
    }

    function resetHeartbeat() {
      if (state.hbTimer) clearInterval(state.hbTimer);
      // 页面隐藏时降低心跳频率，避免浪费后台网络资源
      const interval = document.hidden ? 60000 : 20000;
      state.hbTimer = setInterval(() => {
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          state.ws.send(JSON.stringify({ type: 'ping', ts: Date.now(), hidden: document.hidden }));
        }
      }, interval);
    }

    function connectWS() {
      setStatus('连接中...');
      state.ws = new WebSocket(wsUrl());

      state.ws.onopen = () => {
        setStatus('已连接', true, false);
        resetHeartbeat();
      };

      state.ws.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch (_) {
          return;
        }

        if (data.type === 'init' && Array.isArray(data.records)) {
          state.records = [];
          state.recordIdSet.clear();
          state.selectedRecordIds.clear();
          for (const record of data.records) {
            addRecord(record, false);
          }
          renderRecords();
          return;
        }

        if (data.type === 'new_record' && data.record) {
          addRecord(data.record, true);
          return;
        }

        if (data.type === 'record_updated' && data.record) {
          updateRecord(data.record);
          return;
        }

        if (data.type === 'mobile_connected' && data.qr_payload) {
          applyQrPayload(data.qr_payload);
          showToast('手机已连接，二维码已刷新');
          return;
        }

        if (data.type === 'pairing_request') {
          showToast('收到新的配对请求');
          refreshPeerState(true);
          return;
        }

        if (data.type === 'pairing_result') {
          const peerName = data.device_name || '对端设备';
          const message = data.accepted ? `${peerName} 配对成功` : `${peerName} 拒绝了配对`;
          showToast(message);
          refreshPeerState(true);
          return;
        }

        if (data.type === 'pairing_list_updated') {
          refreshPeerState(true);
          return;
        }

        if (data.type === 'remove_record' && data.id) {
          removeRecord(data.id);
        }
      };

      state.ws.onclose = () => {
        setStatus('连接断开，重连中...', false, true);
        if (state.hbTimer) clearInterval(state.hbTimer);
        state.reconnectTimer = setTimeout(connectWS, 1800);
      };

      state.ws.onerror = () => {
        setStatus('连接异常', false, true);
      };
    }

    async function notifyInBackground(record) {
      if (!('Notification' in window)) return;
      if (!document.hidden) return;

      if (Notification.permission === 'default') {
        try { await Notification.requestPermission(); } catch (_) {}
      }
      if (Notification.permission === 'granted') {
        new Notification('收到新文件', { body: record.name });
      }
    }

    async function initHistory() {
      try {
        const resp = await fetch('/records', { headers: authHeaders() });
        if (!resp.ok) return;
        const data = await resp.json();
        if (!Array.isArray(data.records)) return;
        state.records = [];
        state.recordIdSet.clear();
        state.selectedRecordIds.clear();
        for (const record of data.records) {
          addRecord(record, false);
        }
        renderRecords();
      } catch (_) {
      }
    }

    function syncLimitInput() {
      const gb = Math.max(1, Math.round(state.maxUploadBytes / 1024 / 1024 / 1024));
      ui.uploadLimitGb.value = String(gb);
    }

    async function loadSettings() {
      try {
        const resp = await fetch('/settings', { headers: authHeaders() });
        if (!resp.ok) return;
        const data = await resp.json();
        if (typeof data.max_upload_bytes === 'number' && data.max_upload_bytes > 0) {
          state.maxUploadBytes = data.max_upload_bytes;
          syncLimitInput();
        }
        if (typeof data.download_dir === 'string' && data.download_dir.trim()) {
          state.downloadDir = data.download_dir.trim();
          ui.downloadDirInput.value = state.downloadDir;
        }
        if (typeof data.default_download_dir === 'string' && data.default_download_dir.trim()) {
          state.defaultDownloadDir = data.default_download_dir.trim();
        }
      } catch (_) {
      }
    }

    async function saveDownloadDir() {
      const downloadDir = (ui.downloadDirInput.value || '').trim();
      if (!downloadDir) {
        showToast('请输入下载目录');
        return;
      }

      try {
        const resp = await fetch('/settings/download-dir', {
          method: 'POST',
          headers: {
            ...authHeaders(),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ download_dir: downloadDir }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `保存失败(${resp.status})`);
        state.downloadDir = data.download_dir;
        ui.downloadDirInput.value = state.downloadDir;
        showToast('下载目录已更新');
      } catch (err) {
        console.error(err);
        showToast('下载目录更新失败');
      }
    }

    async function openDownloadDir() {
      try {
        const resp = await fetch('/settings/open-download-dir', {
          method: 'POST',
          headers: authHeaders(),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `打开失败(${resp.status})`);
      } catch (err) {
        console.error(err);
        showToast('打开目录失败');
      }
    }

    function hasDesktopDirectoryPicker() {
      return !!(window.pywebview && window.pywebview.api && typeof window.pywebview.api.choose_download_directory === 'function');
    }

    function syncDirectoryPickerAvailability() {
      if (!ui.pickDownloadDirBtn) return;
      const ready = hasDesktopDirectoryPicker();
      ui.pickDownloadDirBtn.disabled = false;
      ui.pickDownloadDirBtn.title = ready ? '' : '当前运行模式不支持系统文件夹选择';
    }

    function probeDirectoryPickerAvailability(maxAttempts = 20, intervalMs = 300) {
      if (hasDesktopDirectoryPicker()) {
        syncDirectoryPickerAvailability();
        return;
      }
      let attempts = 0;
      const timer = setInterval(() => {
        attempts += 1;
        syncDirectoryPickerAvailability();
        if (hasDesktopDirectoryPicker() || attempts >= maxAttempts) {
          clearInterval(timer);
        }
      }, intervalMs);
    }

    async function pickDownloadDir() {
      if (!hasDesktopDirectoryPicker()) {
        showToast('当前运行模式不支持系统文件夹选择');
        return;
      }

      const current = (ui.downloadDirInput.value || state.downloadDir || state.defaultDownloadDir || '').trim();
      try {
        const selected = await window.pywebview.api.choose_download_directory(current);
        if (!selected) {
          showToast('未选择目录');
          return;
        }
        ui.downloadDirInput.value = selected;
        await saveDownloadDir();
      } catch (err) {
        console.error(err);
        showToast('选择目录失败');
      }
    }

    async function saveUploadLimit() {
      const gb = Number(ui.uploadLimitGb.value || '10');
      if (!Number.isFinite(gb) || gb < 1 || gb > 100) {
        showToast('上传限制需在 1 到 100 GB');
        return;
      }
      const maxUploadBytes = Math.floor(gb * 1024 * 1024 * 1024);
      try {
        const resp = await fetch('/settings/upload-limit', {
          method: 'POST',
          headers: {
            ...authHeaders(),
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ max_upload_bytes: maxUploadBytes }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `保存失败(${resp.status})`);
        state.maxUploadBytes = data.max_upload_bytes;
        syncLimitInput();
        showToast('上传限制已更新');
      } catch (err) {
        console.error(err);
        showToast('上传限制更新失败');
      }
    }

    function bindEvents() {
      const onPywebviewReady = () => {
        syncDirectoryPickerAvailability();
      };
      window.addEventListener('pywebviewready', onPywebviewReady);
      document.addEventListener('pywebviewready', onPywebviewReady);
      ui.settingsBtn.addEventListener('click', () => toggleSettingsPanel());
      if (ui.closeSettingsBtn) {
        ui.closeSettingsBtn.addEventListener('click', () => toggleSettingsPanel(false));
      }
      if (ui.settingsModal) {
        ui.settingsModal.addEventListener('click', (event) => {
          if (event.target === ui.settingsModal) toggleSettingsPanel(false);
        });
      }
      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Escape') return;
        if (state.recordDeleteMode) {
          setRecordDeleteMode(false);
          return;
        }
        toggleSettingsPanel(false);
      });
      ui.sendBtn.addEventListener('click', () => {
        if (state.role === 'desktop') {
          pickDesktopFilesNoCopy();
          return;
        }
        ui.fileInput.click();
      });
      ui.fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files || []);
        if (files.length) uploadFiles(files, state.role);
        e.target.value = '';
      });
      if (ui.cameraBtn && ui.cameraInput) {
        ui.cameraBtn.addEventListener('click', () => {
          if (state.role !== 'mobile') return;
          ui.cameraInput.click();
        });
        ui.cameraInput.addEventListener('change', (e) => {
          const files = Array.from(e.target.files || []);
          if (files.length) uploadFiles(files, 'mobile');
          e.target.value = '';
        });
      }
      document.addEventListener('visibilitychange', async () => {
        resetHeartbeat();
        if (document.hidden && 'Notification' in window && Notification.permission === 'default') {
          try { await Notification.requestPermission(); } catch (_) {}
        }
      });

      if (state.role === 'desktop') {
        if (ui.cameraBtn) ui.cameraBtn.style.display = 'none';
        ui.limitRow.style.display = 'flex';
        ui.downloadDirRow.style.display = 'flex';
        ui.sendTargetRow.style.display = 'flex';
        ui.peerDiscoveryRow.style.display = 'flex';
        ui.pairRequestsRow.style.display = 'flex';
        ui.pairedDevicesRow.style.display = 'flex';
        if (ui.recordDeleteRow) ui.recordDeleteRow.style.display = 'flex';
        ui.saveLimitBtn.addEventListener('click', () => saveUploadLimit());
        ui.pickDownloadDirBtn.addEventListener('click', () => pickDownloadDir());
        ui.saveDownloadDirBtn.addEventListener('click', () => saveDownloadDir());
        ui.openDownloadDirBtn.addEventListener('click', () => openDownloadDir());
        if (ui.deleteRecordsBtn) {
          ui.deleteRecordsBtn.addEventListener('click', () => beginDeleteRecordsFlow());
        }
        if (ui.deleteSelectedRecordsBtn) {
          ui.deleteSelectedRecordsBtn.addEventListener('click', () => deleteSelectedRecords());
        }
        if (ui.cancelDeleteModeBtn) {
          ui.cancelDeleteModeBtn.addEventListener('click', () => setRecordDeleteMode(false));
        }
        if (ui.refreshPeersBtn) {
          ui.refreshPeersBtn.addEventListener('click', () => refreshPeerState(false));
        }
        if (ui.sendTargetSelect) {
          ui.sendTargetSelect.addEventListener('change', () => {
            const value = String(ui.sendTargetSelect.value || 'mobile').trim();
            persistDesktopTarget(value || 'mobile');
          });
        }
        ui.resetDownloadDirBtn.addEventListener('click', () => {
          if (!state.defaultDownloadDir) {
            showToast('默认下载目录不可用');
            return;
          }
          ui.downloadDirInput.value = state.defaultDownloadDir;
          saveDownloadDir();
        });
        syncDirectoryPickerAvailability();
        probeDirectoryPickerAvailability();

        if (serverConfig.mobileQrDataUrl && serverConfig.mobileUrl) {
          applyQrPayload({
            mobile_url: serverConfig.mobileUrl,
            mobile_qr_data_url: serverConfig.mobileQrDataUrl,
            token_expires_at: serverConfig.tokenExpiresAt,
          });
          startQrCountdown();
        }

        if (ui.refreshQrBtn) {
          ui.refreshQrBtn.addEventListener('click', () => refreshQrPayload());
        }

        ui.dropZone.style.display = 'block';
        syncDesktopTipText();
        syncRecordSelectionBar();

        const enter = () => ui.dropZone.classList.add('active');
        const leave = () => ui.dropZone.classList.remove('active');

        document.addEventListener('dragenter', (e) => { e.preventDefault(); enter(); });
        document.addEventListener('dragover', (e) => { e.preventDefault(); enter(); });
        document.addEventListener('dragleave', (e) => {
          e.preventDefault();
          if (e.relatedTarget === null) leave();
        });

        document.addEventListener('drop', (e) => {
          e.preventDefault();
          leave();
          const files = Array.from(e.dataTransfer?.files || []);
          if (!files.length) return;
          const rawPaths = files
            .map((file) => String(file && file.path ? file.path : '').trim())
            .filter((p) => p.length > 0);
          if (rawPaths.length === files.length) {
            uploadDesktopPathsNoCopy(rawPaths);
            return;
          }
          uploadFiles(files, 'desktop');
        });
        // 初始化时静默刷新一次以填充发送目标下拉框状态，实际轮询在设置面板打开时才启动
        refreshPeerState(true);
      } else {
        if (ui.cameraBtn) ui.cameraBtn.style.display = 'inline-flex';
        ui.limitRow.style.display = 'none';
        ui.downloadDirRow.style.display = 'none';
        ui.sendTargetRow.style.display = 'none';
        ui.peerDiscoveryRow.style.display = 'none';
        ui.pairRequestsRow.style.display = 'none';
        ui.pairedDevicesRow.style.display = 'none';
        if (ui.recordDeleteRow) ui.recordDeleteRow.style.display = 'none';
        ui.tip.textContent = '点击“发送文件”选择文件，或“拍照上传”直接拍照发送到电脑。';
      }
    }

    async function init() {
      ui.meta.textContent = `${location.origin} · 当前设备: ${state.role === 'desktop' ? '电脑端' : '手机端'}`;
      syncLimitInput();
      if (state.role === 'desktop') renderPeerState();
      if (serverConfig.accessDenied) {
        setStatus('未授权访问', false, true);
        ui.tip.textContent = serverConfig.accessDeniedReason || '当前访问未授权，请重新扫码。';
        ui.sendBtn.disabled = true;
        ui.sendBtn.style.opacity = '0.5';
        if (ui.cameraBtn) {
          ui.cameraBtn.disabled = true;
          ui.cameraBtn.style.opacity = '0.5';
        }
        ui.settingsBtn.disabled = true;
        ui.settingsPanel.style.opacity = '0.55';
        ui.settingsPanel.style.pointerEvents = 'none';
        toggleSettingsPanel(false);
        return;
      }
      await loadSettings();
      bindEvents();
      toggleSettingsPanel(false);
      initHistory();
      connectWS();
    }

    init();
    window.__lftOpenSettings = () => toggleSettingsPanel(true);
  </script>
</body>
</html>
